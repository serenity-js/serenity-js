<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'">
    <title>Serenity/JS Electron Test App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .section h2 {
            margin-top: 0;
            color: #555;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
            min-height: 20px;
        }
        #click-count {
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>
    <h1>Serenity/JS Electron Test App</h1>
    <p id="app-description">This is an example Electron application for testing Serenity/JS interactions.</p>

    <div class="section">
        <h2>Button Interaction</h2>
        <button id="click-button">Click Me</button>
        <p>Button clicked: <span id="click-count">0</span> times</p>
    </div>

    <div class="section">
        <h2>Text Input</h2>
        <label for="text-input">Enter some text:</label>
        <input type="text" id="text-input" placeholder="Type here...">
        <p>You entered: <span id="input-result"></span></p>
    </div>

    <div class="section">
        <h2>Form Submission</h2>
        <label for="name-input">Name:</label>
        <input type="text" id="name-input" placeholder="Enter your name">
        <button id="submit-button">Submit</button>
        <p id="result"></p>
    </div>

    <div class="section">
        <h2>Multi-Window Testing</h2>
        <button id="open-window-button">Open Secondary Window</button>
        <p id="window-status"></p>
    </div>

    <script>
        // Button click counter
        let clickCount = 0;
        const clickButton = document.getElementById('click-button');
        const clickCountDisplay = document.getElementById('click-count');

        clickButton.addEventListener('click', () => {
            clickCount++;
            clickCountDisplay.textContent = clickCount.toString();
        });

        // Text input mirror
        const textInput = document.getElementById('text-input');
        const inputResult = document.getElementById('input-result');

        textInput.addEventListener('input', () => {
            inputResult.textContent = textInput.value;
        });

        // Form submission
        const nameInput = document.getElementById('name-input');
        const submitButton = document.getElementById('submit-button');
        const result = document.getElementById('result');

        submitButton.addEventListener('click', () => {
            const name = nameInput.value.trim();
            if (name) {
                result.textContent = `Hello, ${name}! Form submitted successfully.`;
            } else {
                result.textContent = 'Please enter a name.';
            }
        });

        // Open secondary window
        const openWindowButton = document.getElementById('open-window-button');
        const windowStatus = document.getElementById('window-status');

        openWindowButton.addEventListener('click', async () => {
            try {
                const response = await window.electronAPI.openSecondaryWindow();
                if (response.success) {
                    windowStatus.textContent = 'Secondary window opened!';
                }
            } catch (error) {
                windowStatus.textContent = `Error: ${error}`;
            }
        });
    </script>
</body>
</html>
