<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'">
    <title>Secondary Window</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            background-color: #f0f8ff;
        }
        h1 {
            color: #333;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        #secondary-click-count {
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>Secondary Window</h1>
    <p id="secondary-description">This is a secondary window for multi-window testing.</p>

    <div class="section">
        <h2>Secondary Button</h2>
        <button id="secondary-button">Click Secondary</button>
        <p>Clicked: <span id="secondary-click-count">0</span> times</p>
    </div>

    <script>
        // Simple inline script for the secondary window
        let clickCount = 0;
        const button = document.getElementById('secondary-button');
        const countDisplay = document.getElementById('secondary-click-count');

        button.addEventListener('click', () => {
            clickCount++;
            countDisplay.textContent = clickCount.toString();
        });
    </script>
</body>
</html>
